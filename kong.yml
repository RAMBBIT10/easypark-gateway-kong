_format_version: "3.0"
_transform: true

services:
  - name: easypark-backend
    url: https://easypark-final-production.up.railway.app
    connect_timeout: 10000
    read_timeout: 30000
    write_timeout: 30000

routes:
  - name: auth-route
    service: easypark-backend
    paths:
      - /auth
    strip_path: false
    preserve_host: false

  - name: parqueaderos-route
    service: easypark-backend
    paths:
      - /parqueaderos
    strip_path: false
    preserve_host: false

  - name: reservas-route
    service: easypark-backend
    paths:
      - /reservas
    strip_path: false
    preserve_host: false

plugins:
  - name: cors
    config:
      origins:
        - https://easypark-frontend.vercel.app
      methods:
        - GET
        - POST
        - PUT
        - DELETE
        - OPTIONS
        - PATCH
      headers:
        - Authorization
        - Content-Type
        - Accept
      exposed_headers:
        - Authorization
      credentials: true
      max_age: 3600

  - name: rate-limiting
    config:
      minute: 120
      hour: 5000
      policy: local
      fault_tolerant: true
      hide_client_headers: false

  - name: response-transformer
    config:
      add:
        headers:
          - X-Gateway:Kong-EasyPark
          - X-Powered-By:EasyPark-Gateway
